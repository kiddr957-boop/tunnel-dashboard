<div id="root"></div>
<script>
(function(){
  var sp = new URLSearchParams(window.location.search);
  var shareId = sp.get('id');
  if (shareId) {
    window.__pendingShareId = shareId;
    history.replaceState(null, '', window.location.pathname);
  }
  window.__saveShare = function(state, cb) {
    fetch('/api/share', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})
    .then(function(r){return r.json()})
    .then(function(j){var url=window.location.origin+window.location.pathname+'?id='+j.id;cb(null,url,j.id)})
    .catch(function(e){cb(e)});
  };
  window.__loadShare = function(id, cb) {
    fetch('/api/share?id='+encodeURIComponent(id))
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
    .then(function(data){cb(null,data)})
    .catch(function(e){cb(e)});
  };
})();
</script>
